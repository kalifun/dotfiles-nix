# Terminal multiplexer
# https://github.com/tmux/tmux
# cSpell:words christoomey joshmedeski lazygit brightblack nobold gitmux

bind-key "K" run-shell "sesh connect \"$(
  sesh list --icons --hide-duplicates | fzf-tmux -p 100%,100% --no-border \
    --list-border \
    --no-sort --prompt '‚ö°  ' \
    --input-border \
    --header-border \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-b:abort' \
    --bind 'ctrl-a:change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(ÓĮą  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(‚öôÔłŹ  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(ūüďĀ  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(ūüĒé  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --preview-window 'right:70%' \
    --preview 'sesh preview {}' \
)\""

set -g base-index 1           # start indexing windows at 1 instead of 0
set -g detach-on-destroy off  # don't exit from tmux when closing a session 
set -g escape-time 50         # zero-out escape time delay  https://github.com/microsoft/WSL/issues/5931
set -g history-limit 1000000  # significantly increase history size
set -g mouse on               # enable mouse support
set -g renumber-windows on    # renumber all windows when any window is closed
set -g set-clipboard on       # use system clipboard
set -g status-interval 2      # update status every 2 seconds
set -g status-left-length 200 # increase status line length
set -g status-position top    # macOS / darwin style
set -g status-right ''        # empty

set -g pane-active-border-style     'fg=magenta,bg=default'
set -g pane-border-style            'fg=brightblack,bg=default'
set -g status-style                 'bg=default' # transparent
set -g window-status-current-format '#[fg=magenta]#W'
set -g window-status-format         '#[fg=gray]#W'

set -g status-left  '#[fg=blue,bold]#S #[fg=white,nobold]'
set -ga status-left '#(gitmux -cfg $HOME/.config/tmux/gitmux.conf)'

set-option -g default-terminal        'screen-256color'
set-option -g terminal-overrides      ',xterm-256color:RGB'

bind '%' split-window -c '#{pane_current_path}' -h
bind '"' split-window -c '#{pane_current_path}'
bind c   new-window   -c '#{pane_current_path}'
bind g   new-window   -n 'Óúā' lazygit
bind h   select-pane  -L
bind j   select-pane  -D
bind k   select-pane  -U
bind l   select-pane  -R

bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'v'   send-keys -X begin-selection
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt (cmd+w)
# bind-key "K" run-shell "sesh_fzf_tmux"

# TODO: add fzf options for t
# set -g @t-fzf-options '-p 70%,30% --prompt="ÓĮą "'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="Ôāé   " --border-label=" Open URL "'
set -g @t-fzf-prompt 'ÓĮą  '
set -g @fzf-url-history-limit '2000'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'joshmedeski/tmux-fzf-url'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm' # always at end of file
